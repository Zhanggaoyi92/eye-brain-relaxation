<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼脑放松 · 3分钟科学动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f1a;
    overflow: hidden;
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #c0d8e8;
    user-select: none;
    cursor: none;
  }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

  /* Overlay UI */
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }

  /* Start Screen */
  #startScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; background: radial-gradient(ellipse at center, #0f1b2d 0%, #060b14 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity 0.8s;
  }
  #startScreen.hidden { opacity: 0; pointer-events: none; }
  #startScreen h1 {
    font-size: 2.4em; font-weight: 300; letter-spacing: 0.15em;
    color: #7ec8d8; margin-bottom: 0.3em;
    text-shadow: 0 0 40px rgba(100,180,200,0.3);
  }
  #startScreen .subtitle {
    font-size: 1em; color: #5a8a9a; margin-bottom: 2.5em; letter-spacing: 0.08em;
  }
  #startScreen .start-btn {
    padding: 14px 48px; border: 1px solid rgba(100,180,200,0.4);
    border-radius: 40px; color: #7ec8d8; font-size: 1.1em;
    letter-spacing: 0.2em; cursor: pointer;
    background: rgba(100,180,200,0.06);
    transition: all 0.4s;
    position: relative; z-index: 110;
  }
  #startScreen .start-btn:hover {
    background: rgba(100,180,200,0.15);
    border-color: rgba(100,180,200,0.7);
    box-shadow: 0 0 30px rgba(100,180,200,0.2);
  }
  /* Duration selector */
  .duration-area {
    margin-bottom: 2em;
    text-align: center;
    position: relative;
  }
  .duration-trigger {
    background: transparent;
    border: none;
    color: #7ec8d8;
    font-size: 1em;
    font-weight: 300;
    letter-spacing: 0.12em;
    padding: 8px 0;
    cursor: pointer;
    outline: none;
    transition: color 0.3s;
    font-family: inherit;
  }
  .duration-trigger:hover { color: #a0e0f0; }
  .duration-trigger .arrow {
    display: inline-block;
    margin-left: 6px;
    font-size: 0.5em;
    color: #5a9aaa;
    transition: transform 0.3s;
    vertical-align: middle;
    line-height: 1;
    position: relative;
    top: -0.05em;
  }
  .duration-trigger.open .arrow { transform: rotate(180deg); }
  .duration-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) translateY(-6px);
    min-width: 260px;
    width: max-content;
    background: linear-gradient(145deg, rgba(15,25,40,0.97), rgba(10,18,30,0.99));
    border: 1px solid rgba(100,180,200,0.15);
    border-radius: 12px;
    padding: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 111;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(80,160,180,0.04);
  }
  .duration-dropdown.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .duration-dropdown .dd-item {
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .duration-dropdown .dd-item:hover {
    background: rgba(100,180,200,0.1);
  }
  .duration-dropdown .dd-item.active {
    background: rgba(100,180,200,0.12);
  }
  .duration-dropdown .dd-item .dd-name {
    font-size: 0.88em;
    color: #8ab0c0;
    font-weight: 300;
    letter-spacing: 0.06em;
  }
  .duration-dropdown .dd-item.active .dd-name { color: #7ec8d8; }
  .duration-dropdown .dd-item .dd-desc {
    font-size: 0.65em;
    color: #4a7a8a;
    margin-top: 3px;
    white-space: nowrap;
  }
  #startScreen .theory {
    margin-top: 3em; max-width: 560px; text-align: center;
    font-size: 0.78em; color: #3a6a7a; line-height: 1.8;
  }
  #startScreen .theory .theory-tag {
    color: #5a9aaa; cursor: pointer;
    border-bottom: 1px dashed rgba(90,154,170,0.4);
    transition: all 0.3s;
    padding-bottom: 1px;
    position: relative; z-index: 110;
  }
  #startScreen .theory .theory-tag:hover {
    color: #7ec8d8;
    border-bottom-color: rgba(126,200,216,0.7);
  }

  /* Theory Modal */
  #theoryModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  #theoryModal.show { opacity: 1; pointer-events: auto; }
  #theoryModal .backdrop {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 8, 15, 0.85);
    backdrop-filter: blur(8px);
  }
  #theoryModal .modal-content {
    position: relative; z-index: 1;
    max-width: 520px; width: 90%;
    background: linear-gradient(145deg, rgba(15,25,40,0.95), rgba(10,18,30,0.98));
    border: 1px solid rgba(100,180,200,0.15);
    border-radius: 16px; padding: 36px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(80,160,180,0.05);
    cursor: default;
    transform: translateY(10px);
    transition: transform 0.4s;
  }
  #theoryModal.show .modal-content { transform: translateY(0); }
  #theoryModal .modal-title {
    font-size: 1.3em; font-weight: 400; color: #7ec8d8;
    margin-bottom: 6px; letter-spacing: 0.08em;
  }
  #theoryModal .modal-source {
    font-size: 0.75em; color: #3a7a8a; margin-bottom: 18px;
    letter-spacing: 0.05em;
  }
  #theoryModal .modal-body {
    font-size: 0.88em; color: #8ab0c0; line-height: 1.9;
    font-weight: 300;
  }
  #theoryModal .modal-body strong { color: #a0d0e0; font-weight: 400; }
  #theoryModal .modal-close {
    margin-top: 24px; text-align: center;
    font-size: 0.82em; color: #4a8a9a; cursor: pointer;
    letter-spacing: 0.1em; transition: color 0.3s;
  }
  #theoryModal .modal-close:hover { color: #7ec8d8; }

  /* Phase label */
  #phaseLabel {
    position: fixed; top: 36px; left: 50%; transform: translateX(-50%);
    z-index: 20; font-size: 1.05em; font-weight: 300;
    letter-spacing: 0.18em; color: rgba(160,210,230,0.7);
    opacity: 0; transition: opacity 0.8s;
    text-shadow: 0 0 20px rgba(100,180,200,0.2);
  }
  #phaseLabel.show { opacity: 1; }

  /* Instruction text */
  #instruction {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 20; font-size: 0.95em; font-weight: 300;
    letter-spacing: 0.1em; color: rgba(140,200,220,0.6);
    opacity: 0; transition: opacity 0.6s;
    text-align: center; white-space: nowrap;
  }
  #instruction.show { opacity: 1; }

  /* Timer */
  #timer {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    z-index: 20; font-size: 0.8em; font-weight: 300;
    letter-spacing: 0.15em; color: rgba(120,180,200,0.4);
    opacity: 0; transition: opacity 0.8s;
  }
  #timer.show { opacity: 1; }

  /* Progress bar */
  #progressBar {
    position: fixed; bottom: 0; left: 0; height: 2px;
    background: linear-gradient(90deg, #2a6a7a, #5abac8, #7ee8d0);
    z-index: 20; transition: width 0.3s linear;
    box-shadow: 0 0 10px rgba(100,200,200,0.3);
  }

  /* Control bar (music + fullscreen) */
  #controlBar {
    position: fixed; top: 20px; right: 20px; z-index: 50;
    display: flex; gap: 12px; align-items: center;
    opacity: 0; transition: opacity 0.5s;
    pointer-events: none;
  }
  #controlBar.show { opacity: 1; pointer-events: auto; }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(100,180,200,0.25);
    background: rgba(15,25,40,0.6);
    backdrop-filter: blur(10px);
    color: #5a9aaa; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s;
    position: relative;
  }
  .ctrl-btn:hover {
    border-color: rgba(100,180,200,0.5);
    color: #7ec8d8;
    background: rgba(20,35,55,0.7);
  }
  .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }
  .ctrl-btn .tooltip {
    position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
    font-size: 0.7em; color: #5a9aaa; white-space: nowrap;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    letter-spacing: 0.05em;
  }
  .ctrl-btn:hover .tooltip { opacity: 1; }

  /* Music panel popup */
  .music-panel {
    position: absolute; top: 50px; right: 0;
    background: rgba(12,20,35,0.95);
    border: 1px solid rgba(100,180,200,0.2);
    border-radius: 12px; padding: 16px;
    min-width: 200px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .music-panel.show { opacity: 1; pointer-events: auto; }
  .music-panel .panel-title {
    font-size: 0.72em; color: #4a8a9a; letter-spacing: 0.1em;
    margin-bottom: 12px; text-transform: uppercase;
  }
  .music-panel .style-list {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 16px;
  }
  .music-panel .style-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    cursor: pointer; transition: all 0.25s;
    border: 1px solid transparent;
  }
  .music-panel .style-item:hover {
    background: rgba(100,180,200,0.08);
  }
  .music-panel .style-item.active {
    background: rgba(100,180,200,0.12);
    border-color: rgba(100,180,200,0.3);
  }
  .music-panel .style-item .style-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .music-panel .style-item .style-info {
    flex: 1;
  }
  .music-panel .style-item .style-name {
    font-size: 0.85em; color: #8ab0c0; font-weight: 400;
  }
  .music-panel .style-item .style-desc {
    font-size: 0.68em; color: #4a7a8a; margin-top: 2px;
  }
  .music-panel .style-item.active .style-name { color: #7ec8d8; }
  .music-panel .style-item.active .style-desc { color: #5a9aaa; }
  .music-panel .volume-row {
    display: flex; align-items: center; gap: 10px;
    padding-top: 12px; border-top: 1px solid rgba(100,180,200,0.1);
  }
  .music-panel .volume-row svg {
    width: 14px; height: 14px; fill: #5a9aaa; flex-shrink: 0;
  }
  .music-panel input[type="range"] {
    -webkit-appearance: none; flex: 1; height: 3px;
    background: rgba(100,180,200,0.2); border-radius: 2px; outline: none;
  }
  .music-panel input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #5a9aaa; cursor: pointer;
    border: none;
  }
  .music-panel .vol-label {
    font-size: 0.7em; color: #5a9aaa; min-width: 32px; text-align: right;
  }

  /* Completion screen */
  #completeScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; background: radial-gradient(ellipse at center, #0f1b2d 0%, #060b14 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 1s;
    cursor: pointer;
  }
  #completeScreen.show { opacity: 1; pointer-events: auto; }
  #completeScreen h1 {
    font-size: 2em; font-weight: 300; letter-spacing: 0.15em;
    color: #7ec8d8; margin-bottom: 0.5em;
  }
  #completeScreen .msg {
    font-size: 0.95em; color: #5a8a9a; margin-bottom: 2em;
  }
  #completeScreen .restart-btn {
    padding: 12px 40px; border: 1px solid rgba(100,180,200,0.4);
    border-radius: 40px; color: #7ec8d8; font-size: 1em;
    letter-spacing: 0.15em; cursor: pointer;
    background: rgba(100,180,200,0.06);
    transition: all 0.4s;
  }
  #completeScreen .restart-btn:hover {
    background: rgba(100,180,200,0.15);
    border-color: rgba(100,180,200,0.7);
  }

  /* Stats styles */
  .stats-bar {
    position: fixed; bottom: 20px; left: 20px; z-index: 50;
    display: flex; gap: 16px; align-items: center;
    opacity: 0; transition: opacity 0.5s;
    pointer-events: none;
  }
  .stats-bar.show { opacity: 1; pointer-events: auto; }
  .stats-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75em; color: #4a7a8a; letter-spacing: 0.05em;
  }
  .stats-item svg { width: 14px; height: 14px; fill: #4a7a8a; }

  /* Report card on complete screen */
  .report-card {
    background: rgba(15,25,40,0.6);
    border: 1px solid rgba(100,180,200,0.15);
    border-radius: 12px; padding: 20px 28px;
    margin-bottom: 24px; min-width: 280px;
  }
  .report-card .report-title {
    font-size: 0.72em; color: #4a8a9a; letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 14px; text-align: center;
  }
  .report-card .report-stats {
    display: flex; justify-content: space-around; gap: 20px;
  }
  .report-card .stat {
    text-align: center;
  }
  .report-card .stat-value {
    font-size: 1.8em; font-weight: 300; color: #7ec8d8;
  }
  .report-card .stat-label {
    font-size: 0.68em; color: #4a7a8a; margin-top: 4px;
  }
  .report-card .encouragement {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid rgba(100,180,200,0.1);
    text-align: center; font-size: 0.82em; color: #5a9aaa;
    line-height: 1.6;
  }
  .report-card .streak-badge {
    display: inline-block; background: rgba(100,180,200,0.1);
    border: 1px solid rgba(100,180,200,0.2);
    border-radius: 20px; padding: 4px 12px; margin-top: 10px;
    font-size: 0.75em; color: #7ec8d8;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="phaseLabel"></div>
<div id="instruction"></div>
<div id="timer"></div>
<div id="progressBar" style="width:0%"></div>

<!-- Control bar: music + fullscreen -->
<div id="controlBar">
  <div class="ctrl-btn" id="musicBtn">
    <svg id="musicIconMuted" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <svg id="musicIconOn" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <span class="tooltip">音乐</span>
    <div class="music-panel" id="musicPanel">
      <div class="panel-title">选择音乐风格</div>
      <div class="style-list" id="styleList"></div>
      <div class="volume-row">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <input type="range" id="volumeSlider" min="0" max="100" value="40">
        <span class="vol-label" id="volLabel">40%</span>
      </div>
    </div>
  </div>
  <div class="ctrl-btn" id="fullscreenBtn">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    <span class="tooltip">全屏</span>
  </div>
</div>

<div id="startScreen">
  <h1>眼脑放松</h1>
  <div class="duration-area" id="durationArea">
    <button class="duration-trigger" id="durationTrigger">
      <span id="durationLabel">3 分钟科学恢复</span>
      <span class="arrow">▾</span>
    </button>
    <div class="duration-dropdown" id="durationDropdown">
      <div class="dd-item active" data-dur="standard">
        <div class="dd-name">3 分钟科学恢复</div>
        <div class="dd-desc">呼吸引导 · 眼球运动 · 焦点切换 · 视觉放松</div>
      </div>
      <div class="dd-item" data-dur="complete">
        <div class="dd-name">10 分钟完整恢复</div>
        <div class="dd-desc">完整贝茨训练 · 深度正念冥想 · 充分远近调节</div>
      </div>
    </div>
  </div>
  <div class="start-btn" id="startBtn">开始放松</div>
  <div class="theory">
    基于 <span class="theory-tag" data-theory="20-20-20">20-20-20 法则</span> · <span class="theory-tag" data-theory="4-7-8">4-7-8 呼吸法</span> · <span class="theory-tag" data-theory="bates">贝茨眼球运动</span><br>
    <span class="theory-tag" data-theory="accommodation">调节灵活度训练</span> · <span class="theory-tag" data-theory="chromotherapy">色彩疗法</span> · <span class="theory-tag" data-theory="mindfulness">正念减压</span><br><br>
    请将屏幕置于舒适距离，全程跟随引导即可
  </div>
</div>

<!-- Theory Detail Modal -->
<div id="theoryModal">
  <div class="backdrop" id="modalBackdrop"></div>
  <div class="modal-content">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-source" id="modalSource"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-close" id="modalClose">点击任意处关闭</div>
  </div>
</div>

<div id="completeScreen">
  <h1>放松完成</h1>
  <div class="report-card" id="reportCard">
    <div class="report-title">本次放松报告</div>
    <div class="report-stats">
      <div class="stat">
        <div class="stat-value" id="reportSessions">0</div>
        <div class="stat-label">累计次数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="reportDuration">0</div>
        <div class="stat-label">累计时长(分)</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="reportStreak">0</div>
        <div class="stat-label">连续天数</div>
      </div>
    </div>
    <div class="encouragement" id="encouragement">
      坚持就是胜利，你的眼睛在感谢你！
    </div>
  </div>
